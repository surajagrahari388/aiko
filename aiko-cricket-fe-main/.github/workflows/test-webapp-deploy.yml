name: Test Aiko Cricket Frontend CI/CD

on:
  push:
    tags:
      - 't*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: read
  security-events: write

env:
  VERSION_TAG: ${{ github.ref_name }}

jobs:
  test:
    name: Test 🧪
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: Determine package manager 📦
        id: determine-package-manager
        run: |
          if [ -f "yarn.lock" ]; then
            echo "PACKAGE_MANAGER=yarn" >> $GITHUB_ENV
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "PACKAGE_MANAGER=pnpm" >> $GITHUB_ENV
          elif [ -f "package-lock.json" ] || [ -f "npm-shrinkwrap.json" ]; then
            echo "PACKAGE_MANAGER=npm" >> $GITHUB_ENV
          else
            echo "No lock file found. Please ensure you have a lock file in your repository."
            exit 1
          fi

      - name: Install pnpm if needed 📦
        if: env.PACKAGE_MANAGER == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }} 🚀
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ env.PACKAGE_MANAGER }}

      - name: Install dependencies 📦
        run: |
          echo "Using package manager: ${{ env.PACKAGE_MANAGER }}"
          if [ "${{ env.PACKAGE_MANAGER }}" == "yarn" ]; then
            yarn install
          elif [ "${{ env.PACKAGE_MANAGER }}" == "pnpm" ]; then
            pnpm install
          else
            npm install
          fi

      - name: Build 🏗️
        run: |
          if [ "${{ env.PACKAGE_MANAGER }}" == "yarn" ]; then
            yarn build
          elif [ "${{ env.PACKAGE_MANAGER }}" == "pnpm" ]; then
            pnpm build
          else
            npm run build --if-present
          fi
        env:
          API_URL: ${{ secrets.API_URL }}

      - name: Test 🧪
        run: |
          if [ "${{ env.PACKAGE_MANAGER }}" == "yarn" ]; then
            yarn test --if-present
          elif [ "${{ env.PACKAGE_MANAGER }}" == "pnpm" ]; then
            pnpm test --if-present
          else
            npm run test --if-present
          fi

      - name: Upload artifact 🚀
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  build:
    name: Build 🏗️
    runs-on: "ubuntu-latest"
    needs: test

    steps:
      - name: Checkout Code 🛠️
        uses: actions/checkout@v4

      - name: Set up Docker Buildx 🏗️
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry 🔑
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DEFAULT_REGISTRY_SERVER }}
          username: ${{ secrets.DEFAULT_REGISTRY_USERNAME }}
          password: ${{ secrets.DEFAULT_REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image 🚀
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ secrets.DEFAULT_REGISTRY_SERVER }}/aiko-cricket-fe:${{ github.sha }}
            ${{ secrets.DEFAULT_REGISTRY_SERVER }}/aiko-cricket-fe:${{ env.VERSION_TAG }}
          file: Dockerfile
          build-args: |
            DD_GIT_REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}
            DD_GIT_COMMIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DEFAULT_REGISTRY_SERVER }}/aiko-cricket-fe:cache
          cache-to: type=registry,ref=${{ secrets.DEFAULT_REGISTRY_SERVER }}/aiko-cricket-fe:cache,mode=max
          secrets: |
            "API_URL=${{ secrets.API_URL }}"

  deploy:
    name: Deploy to Test Web-App🚀
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "testing"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Deploy to Azure Web App 🌐
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.TEST_AIKO_CRICKET_WEBAPP_NAME }}
          slot-name: "production"
          publish-profile: ${{ secrets.TEST_AIKO_CRICKET_WEBAPP_PUBLISHPROFILE }}
          images: |
            ${{ secrets.DEFAULT_REGISTRY_SERVER }}/aiko-cricket-fe:${{ env.VERSION_TAG }}