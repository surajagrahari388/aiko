services:
  aikocricketfe:
    image: aikocricketfe
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
    ports:
      - 3000:3000
      - 9229:9229
    command: ["node", "--inspect=0.0.0.0:9229", "--require dd-trace/init node_modules/next/dist/bin/next start"]
